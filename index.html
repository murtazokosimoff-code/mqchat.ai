<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MQ CHAT | Pro</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #050608;
            --panel: #101216;
            --accent: #00a3ff;
            --accent-glow: rgba(0, 163, 255, 0.4);
            --border: #1f2229;
            --text: #e1e7ef;
            --user-msg: #1a1d23;
        }

        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }

        #app { display: flex; height: 100vh; width: 100%; }

        /* Сайдбар */
        .sidebar { width: 280px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; z-index: 100; }
        .logo { font-size: 22px; font-weight: 600; color: var(--accent); letter-spacing: 3px; margin-bottom: 30px; text-align: center; }
        .btn-new { background: rgba(0, 163, 255, 0.1); border: 1px solid var(--accent); color: var(--accent); padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 600; }
        .btn-new:hover { background: var(--accent); color: white; }

        /* Основной экран */
        .chat-main { flex: 1; display: flex; flex-direction: column; position: relative; background: radial-gradient(circle at top right, #0a0c10, #050608); min-width: 0; }
        header { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid var(--border); backdrop-filter: blur(10px); }
        .status { font-size: 12px; color: #4caf50; display: flex; align-items: center; gap: 8px; }
        .status::before { content: ''; width: 8px; height: 8px; background: #4caf50; border-radius: 50%; }

        /* Сообщения */
        #chat-flow { flex: 1; overflow-y: auto; padding: 20px 20% 120px 20%; display: flex; flex-direction: column; gap: 25px; }
        .msg-row { width: 100%; display: flex; flex-direction: column; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
        .user-row { align-items: flex-end; }
        .ai-row { align-items: flex-start; }

        .bubble { max-width: 90%; line-height: 1.6; font-size: 16px; word-wrap: break-word; }
        .user-row .bubble { background: var(--user-msg); padding: 12px 18px; border-radius: 18px 18px 0 18px; border: 1px solid var(--border); }
        .ai-row .bubble { width: 100%; }

        /* Код */
        pre { background: #0d0e12 !important; border-radius: 12px; padding: 15px !important; overflow-x: auto; position: relative; }
        .copy-btn { position: absolute; top: 10px; right: 10px; background: #333; color: #fff; border: none; padding: 4px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; }

        /* Ввод */
        .input-zone { position: absolute; bottom: 0; width: 100%; padding: 20px 20% 40px 20%; background: linear-gradient(transparent, var(--bg) 50%); }
        .input-bar { background: #16191f; border: 1px solid var(--border); border-radius: 15px; display: flex; padding: 10px 15px; gap: 10px; align-items: center; }
        input { flex: 1; background: none; border: none; color: white; outline: none; font-size: 16px; }
        #sendBtn { background: var(--accent); color: white; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; font-weight: bold; }

        /* Индикатор */
        .typing { visibility: hidden; padding-left: 20px; color: var(--accent); font-size: 12px; margin-bottom: 5px; }

        /* Адаптивность для мобильных */
        @media (max-width: 850px) {
            .sidebar { display: none; }
            #chat-flow, .input-zone { padding-left: 15px; padding-right: 15px; }
            .bubble { max-width: 95%; }
        }
    </style>
</head>
<body>

<div id="app">
    <div class="sidebar">
        <div class="logo">MQ CHAT</div>
        <button class="btn-new" onclick="resetChat()">+ Новый чат</button>
    </div>

    <div class="chat-main">
        <header>
            <div class="status">System Active</div>
            <div style="opacity: 0.5; font-size: 12px;">MQ_CORE_v4</div>
        </header>

        <div id="chat-flow">
            <div class="msg-row ai-row">
                <div class="bubble">Интерфейс MQ готов. Введите ваш запрос.</div>
            </div>
        </div>

        <div class="input-zone">
            <div id="typing-indicator" class="typing">MQ анализирует...</div>
            <div class="input-bar">
                <input type="text" id="userInput" placeholder="Сообщение..." autocomplete="off">
                <button id="sendBtn">↑</button>
            </div>
        </div>
    </div>
</div>

<script>
    const API_KEY = "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";
    const flow = document.getElementById('chat-flow');
    const input = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const typing = document.getElementById('typing-indicator');

    let history = [];

    async function handleInput() {
        const text = input.value.trim();
        if (!text) return;

        input.value = "";
        sendBtn.disabled = true;

        addMessage(text, 'user');
        history.push({ role: "user", content: text });
        typing.style.visibility = "visible";

        try {
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": "Bearer " + API_KEY,
                    "Content-Type": "application/json",
                    "HTTP-Referer": "https://murtazokosimoff-code.github.io/"
                },
                body: JSON.stringify({
                    "model": "google/gemini-2.0-flash-001",
                    "messages": history
                })
            });

            const data = await response.json();
            if (data.choices && data.choices[0]) {
                const aiText = data.choices[0].message.content;
                const aiBubble = addMessage("", 'ai');
                
                // Эмуляция печати
                let i = 0;
                const interval = setInterval(() => {
                    aiBubble.innerHTML = marked.parse(aiText.substring(0, i));
                    i += 3; // Скорость печати
                    flow.scrollTop = flow.scrollHeight;
                    if (i >= aiText.length + 3) {
                        clearInterval(interval);
                        aiBubble.innerHTML = marked.parse(aiText);
                        aiBubble.querySelectorAll('pre code').forEach((block) => hljs.highlightElement(block));
                    }
                }, 10);

                history.push({ role: "assistant", content: aiText });
            } else {
                addMessage("Ошибка: " + (data.error?.message || "Неизвестная ошибка"), "ai");
            }
        } catch (e) {
            addMessage("Ошибка соединения.", "ai");
        } finally {
            typing.style.visibility = "hidden";
            sendBtn.disabled = false;
            flow.scrollTop = flow.scrollHeight;
        }
    }

    function addMessage(content, role) {
        const row = document.createElement('div');
        row.className = "msg-row " + role + "-row";
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerHTML = role === 'user' ? content : marked.parse(content);
        row.appendChild(bubble);
        flow.appendChild(row);
        flow.scrollTop = flow.scrollHeight;
        return bubble;
    }

    function resetChat() {
        flow.innerHTML = '<div class="msg-row ai-row"><div class="bubble">История очищена.</div></div>';
        history = [];
    }

    sendBtn.onclick = handleInput;
    input.onkeydown = (e) => { if(e.key === 'Enter') handleInput(); };
</script>

</body>
</html>
