<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MQ CHAT | Pro</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #050608;
            --panel: #101216;
            --accent: #00a3ff;
            --accent-glow: rgba(0, 163, 255, 0.4);
            --border: #1f2229;
            --text: #e1e7ef;
            --user-msg: #1a1d23;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }

        #app { display: flex; height: 100vh; }

        /* Сайдбар */
        .sidebar { width: 280px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; z-index: 100; }
        .logo { font-size: 22px; font-weight: 600; color: var(--accent); letter-spacing: 3px; margin-bottom: 30px; text-align: center; }
        .btn-new { background: rgba(0, 163, 255, 0.1); border: 1px solid var(--accent); color: var(--accent); padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 600; margin-bottom: 20px; }
        .btn-new:hover { background: var(--accent); color: white; box-shadow: 0 0 15px var(--accent-glow); }

        /* Основная часть */
        .chat-main { flex: 1; display: flex; flex-direction: column; position: relative; background: radial-gradient(circle at top right, #0a0c10, #050608); }
        
        header { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; border-bottom: 1px solid var(--border); background: rgba(5, 6, 8, 0.5); backdrop-filter: blur(10px); }
        .status { font-size: 12px; color: #4caf50; display: flex; align-items: center; gap: 8px; }
        .status::before { content: ''; width: 8px; height: 8px; background: #4caf50; border-radius: 50%; box-shadow: 0 0 8px #4caf50; }

        /* Сообщения */
        #chat-flow { flex: 1; overflow-y: auto; padding: 40px 20% 120px 20%; display: flex; flex-direction: column; gap: 35px; scrollbar-width: none; }
        .msg-row { width: 100%; display: flex; flex-direction: column; }
        .user-row { align-items: flex-end; }
        .ai-row { align-items: flex-start; }

        .bubble { max-width: 85%; line-height: 1.7; font-size: 16px; position: relative; }
        .user-row .bubble { background: var(--user-msg); padding: 15px 25px; border-radius: 20px 20px 0 20px; border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .ai-row .bubble { width: 100%; }

        /* Код и Markdown */
        pre { background: #0d0e12 !important; border-radius: 12px; border: 1px solid var(--border); padding: 20px !important; margin: 20px 0; position: relative; }
        code { font-family: 'Fira Code', monospace !important; font-size: 14px !important; }
        .copy-btn { position: absolute; top: 10px; right: 10px; background: #2d3139; border: none; color: #fff; font-size: 10px; padding: 5px 10px; border-radius: 6px; cursor: pointer; opacity: 0.6; }
        .copy-btn:hover { opacity: 1; background: var(--accent); }

        /* Ввод */
        .input-zone { position: absolute; bottom: 0; width: 100%; padding: 20px 20% 40px 20%; background: linear-gradient(transparent, var(--bg) 50%); }
        .input-bar { background: #16191f; border: 1px solid var(--border); border-radius: 20px; display: flex; align-items: center; padding: 10px 20px; gap: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .input-bar:focus-within { border-color: var(--accent); box-shadow: 0 0 25px var(--accent-glow); }

        input { flex: 1; background: none; border: none; color: white; font-size: 16px; outline: none; }
        
        .action-btn { background: none; border: none; cursor: pointer; padding: 5px; color: var(--text-secondary); display: flex; align-items: center; justify-content: center; opacity: 0.7; }
        .action-btn:hover { opacity: 1; color: var(--accent); transform: scale(1.1); }
        #sendBtn { background: var(--accent); color: white; width: 40px; height: 40px; border-radius: 50%; opacity: 1; }

        /* Анимация загрузки */
        .typing { display: flex; gap: 5px; padding: 15px; visibility: hidden; }
        .t-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: t-jump 1.4s infinite; }
        .t-dot:nth-child(2) { animation-delay: 0.2s; }
        .t-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes t-jump { 0%, 100% { transform: translateY(0); opacity: 0.2; } 50% { transform: translateY(-10px); opacity: 1; } }
    </style>
</head>
<body>

<div id="app">
    <div class="sidebar">
        <div class="logo">MQ CHAT</div>
        <button class="btn-new" onclick="resetChat()">+ Новая сессия</button>
        <div style="margin-top: auto; font-size: 11px; color: #444; border-top: 1px solid #1f2229; pt: 20px;">
            <p>MQ Intelligence Core v4.0</p>
            <p>Protocol: SSL/AES-256</p>
        </div>
    </div>

    <div class="chat-main">
        <header>
            <div class="status">System Online</div>
            <div style="font-size: 13px; font-weight: 600; opacity: 0.6;">MQ_CHNL_01</div>
        </header>

        <div id="chat-flow">
            <div class="msg-row ai-row">
                <div class="bubble">Привет я MQ CHAT ваш ии помощник.</div>
            </div>
        </div>

        <div class="input-zone">
            <div id="typing-indicator" class="typing">
                <div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div>
            </div>
            <div class="input-bar">
                <button class="action-btn" onclick="startVoice()" title="Голосовой ввод">🎙️</button>
                <input type="text" id="userInput" placeholder="Введите команду..." autocomplete="off">
                <button id="sendBtn" onclick="handleInput()">↑</button>
            </div>
        </div>
    </div>
</div>

<script>
    const API_KEY = "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";
    const flow = document.getElementById('chat-flow');
    const input = document.getElementById('userInput');
    const typing = document.getElementById('typing-indicator');

    let history = [];

    // Инициализация Marked с Highlight.js
    marked.setOptions({
        highlight: function(code, lang) {
            return hljs.highlightAuto(code).value;
        }
    });

    async function handleInput() {
        const text = input.value.trim();
        if (!text) return;

        addMessage(text, 'user');
        history.push({ role: "user", content: text });
        
        input.value = "";
        typing.style.visibility = "visible";

        try {
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${API_KEY}`,
                    "Content-Type": "application/json",
                    "HTTP-Referer": "https://mqchat.pro", // Для OpenRouter
                },
                body: JSON.stringify({
                    "model": "google/gemini-2.0-flash-001",
                    "messages": history,
                    "stream": false // В данной версии для простоты без SSE, но с эмуляцией печати
                })
            });

            const data = await response.json();
            const aiText = data.choices[0].message.content;

            const aiBubble = addMessage("", 'ai');
            typeSimulate(aiBubble, aiText); // Имитация стриминга
            history.push({ role: "assistant", content: aiText });

        } catch (e) {
            addMessage("Ошибка системы. Проверьте соединение.", 'ai');
        } finally {
            typing.style.visibility = "hidden";
        }
    }

    function addMessage(content, role) {
        const row = document.createElement('div');
        row.className = `msg-row ${role}-row`;
        
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        
        if (role === 'user') {
            bubble.innerText = content;
        }

        row.appendChild(bubble);
        flow.appendChild(row);
        flow.scrollTop = flow.scrollHeight;
        return bubble;
    }

    // Эмуляция стриминга (постепенное появление текста)
    function typeSimulate(element, fullText) {
        let i = 0;
        let currentText = "";
        const interval = setInterval(() => {
            currentText += fullText[i];
            element.innerHTML = marked.parse(currentText);
            
            // Добавляем кнопки копирования в блоки кода
            element.querySelectorAll('pre').forEach(pre => {
                if (!pre.querySelector('.copy-btn')) {
                    const btn = document.createElement('button');
                    btn.className = 'copy-btn';
                    btn.innerText = 'COPY';
                    btn.onclick = () => {
                        navigator.clipboard.writeText(pre.innerText.replace('COPY', ''));
                        btn.innerText = 'DONE!';
                        setTimeout(() => btn.innerText = 'COPY', 2000);
                    };
                    pre.appendChild(btn);
                }
            });

            i++;
            flow.scrollTop = flow.scrollHeight;
            if (i >= fullText.length) clearInterval(interval);
        }, 10);
    }

    function resetChat() {
        flow.innerHTML = '<div class="msg-row ai-row"><div class="bubble">История очищена. Ожидаю новых данных.</div></div>';
        history = [];
    }

    // Голосовой ввод
    function startVoice() {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Speech) return alert("Ваш браузер не поддерживает голосовой ввод.");
        
        const rec = new Speech();
        rec.lang = 'ru-RU';
        rec.onstart = () => input.placeholder = "Слушаю...";
        rec.onresult = (e) => {
            input.value = e.results[0][0].transcript;
            input.placeholder = "Введите команду...";
            handleInput();
        };
        rec.start();
    }

    input.onkeydown = (e) => { if(e.key === 'Enter') handleInput(); };
</script>

</body>
</html>
